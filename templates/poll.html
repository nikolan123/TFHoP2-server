<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Poll {{ poll_id }}</title>
<style>
@font-face{font-family:DINSchriftAlternate;src:url('{{ url_for("static", path="dinma98-webfont.woff") }}') format('woff');font-weight:normal;font-style:normal}
html,body{width:100%;height:100%;overflow:hidden}
body{margin:0;padding:0;background:#fff;font-size:100%;color:#333;font-family:DINSchriftAlternate,Arial,Helvetica,sans-serif}
#poll{padding:0;width:369px;height:493px}
#poll a{color:#333;font-weight:bold;text-decoration:underline}
#poll a:hover{color:#17a8dd}
h2{font-size:14px;line-height:1.5em;padding:0 0 5px;text-align:center}
#poll label{display:block;font-size:14px;padding:7px 0 4px;font-weight:normal}
.barempty{height:24px;background:#e3e4e6;width:369px;position:relative}
.barfull{height:24px;background:#17a8dd}
.barvalue{position:absolute;top:5px;left:4px;font-size:12px;font-weight:bold}
#footer{height:30px;font-family:Arial;font-size:11px;margin-top:10px}
#footer a{float:left}
.button{background:#000;color:#fff;float:right;height:25px;font-weight:bold;margin:0 20px 0 0;width:76px;border:0}
.button:hover{background:#17a8dd}
</style>
</head>
<body>
<div id="poll">
<h2>{{ poll.question }}</h2>
<form id="answers" method="post" action="/p2polls/poll{{ poll_id }}.php5"{% if show_results %} style="display:none"{% endif %}>
{% for option in poll.options %}
<label><input type="radio" name="vote" value="{{ loop.index0 }}">{{ option }}</label>
{% endfor %}
<div id="footer"><a href="/p2polls/poll{{ poll_id }}.php5?results=1">View Results</a><input class="button" type="submit" value="Vote"></div>
</form>
<div id="results"{% if not show_results %} style="display:none"{% endif %}>
{% for option in poll.options %}
<label>{{ option }}</label><div class="barempty"><div class="barfull" data-width="{{ percentages[loop.index0] }}" style="width:{{ percentages[loop.index0] }}%"></div><div class="barvalue">{{ percentages[loop.index0] }}%</div></div>
{% endfor %}
<div id="footer"><a href="/p2polls/poll{{ poll_id }}.php5">View Poll</a></div>
</div>
</div>
{% include "partials/about.html" %}
</body>
</html>
